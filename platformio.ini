[env:seeed_xiao_nrf52840]
platform = nordicnrf52
board = seeed_xiao_nrf52840
framework = arduino

; Seeed fork has SoftDevice S140 v7.3.0 — PlatformIO's built-in Adafruit
; core has S140 v6.1.1 (wrong SoftDevice, wrong FWID for DFU packages).
platform_packages =
    framework-arduinoadafruitnrf52 @ https://github.com/Seeed-Studio/Adafruit_nRF52_Arduino.git#1.1.12

; Custom board + variant files live in boards/
board_build.variants_dir = boards/variants

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.12.4
    adafruit/Adafruit SSD1306 @ ^2.5.16
    adafruit/Adafruit BusIO @ ^1.17.4

; Override -Ofast from platform builder with -Os (optimize for size, matches Arduino IDE)
; -Ofast can cause subtle issues with USB/BLE init on nRF52
build_unflags = -Ofast
; -Wno-unused-parameter: Nordic SoftDevice SVCALL stubs trigger -Wunused-parameter
; -Wno-missing-field-initializers: Bluefruit52Lib uses {0} struct init extensively
build_flags =
    -Os -Wall -Wextra -Wno-unused-parameter -Wno-missing-field-initializers
    -DGHOST_PLATFORM_NRF52=1
    -Isrc/common
    -Isrc/nrf52

; Only compile common/ and nrf52/ source files (exclude cyd/)
build_src_filter = +<common/> +<nrf52/>

; Don't archive libraries into .a files — link all objects directly.
; TinyUSB uses indirect driver tables (function pointers) that the linker
; can't trace, causing it to strip CDC/HID class drivers from .a archives.
lib_archive = no

; Adds CC310 crypto library path (framework builder doesn't include it)
extra_scripts = extra_script.py

monitor_speed = 115200

; ============================================================================
; CYD (ESP32-2432S028R) — Cheap Yellow Display
; ============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.0
    paulstoffregen/XPT2046_Touchscreen
    h2zero/NimBLE-Arduino @ ^1.4.0

build_flags =
    -Os -Wall -Wextra -Wno-unused-parameter
    -DGHOST_PLATFORM_CYD=1
    -Isrc/common
    -Isrc/cyd
    ; TFT_eSPI ILI9341 driver configuration (replaces User_Setup.h)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1

build_src_filter = +<common/> +<cyd/>
monitor_speed = 115200
