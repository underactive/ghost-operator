; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:native]
platform = native
build_flags =
	-std=gnu++17
	-Isrc/common
test_framework = unity

[env:seeed_xiao_nrf52840]
platform = nordicnrf52
board = seeed_xiao_nrf52840
framework = arduino
platform_packages = 
	framework-arduinoadafruitnrf52 @ https://github.com/Seeed-Studio/Adafruit_nRF52_Arduino.git#1.1.12
board_build.variants_dir = boards/variants
lib_deps =
	adafruit/Adafruit GFX Library @ ^1.12.4
	adafruit/Adafruit SSD1306 @ ^2.5.16
	adafruit/Adafruit BusIO @ ^1.17.4
	bblanchon/ArduinoJson @ ^7.4.1
build_unflags = -Ofast
build_flags = 
	-Os -Wall -Wextra -Wno-unused-parameter -Wno-missing-field-initializers
	-DGHOST_PLATFORM_NRF52=1
	-Isrc/common
	-Isrc/nrf52
build_src_filter = +<common/> +<nrf52/>
lib_archive = no
extra_scripts = extra_script.py
monitor_speed = 115200
test_ignore = *

[env:c6lcd]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
lib_deps =
	h2zero/NimBLE-Arduino @ ^2.1.0
	adafruit/Adafruit NeoPixel @ ^1.12.0
	bblanchon/ArduinoJson @ ^7.4.1
	lvgl/lvgl@^9.2.0
lib_ldf_mode = deep+
build_flags =
	-Os -Wall -Wextra -Wno-unused-parameter
	-DGHOST_PLATFORM_C6=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DLV_CONF_INCLUDE_SIMPLE
	-Isrc/common
	-Isrc/esp32-c6-lcd-1.47
	-Iinclude
build_src_filter = +<common/> +<esp32-c6-lcd-1.47/>
monitor_speed = 115200
test_ignore = *

[env:s3lcd]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
lib_deps =
	h2zero/NimBLE-Arduino @ ^2.1.0
	adafruit/Adafruit NeoPixel @ ^1.12.0
	bblanchon/ArduinoJson @ ^7.4.1
	lvgl/lvgl@^9.2.0
lib_ldf_mode = deep+
build_flags =
	-Os -Wall -Wextra -Wno-unused-parameter
	-DGHOST_PLATFORM_S3=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DLV_CONF_INCLUDE_SIMPLE
	-Isrc/common
	-Isrc/esp32-s3-lcd-1.47
	-Iinclude
build_src_filter = +<common/> +<esp32-s3-lcd-1.47/>
monitor_speed = 115200
test_ignore = *
