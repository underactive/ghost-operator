name: Build & Release DFU

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # Version from git tag
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"

          # Version from src/config.h
          CODE_VER=$(grep -E '^#define VERSION "' src/config.h | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:  $TAG_VER"
          echo "Code version: $CODE_VER"

          if [[ "$TAG_VER" != "$CODE_VER" ]]; then
            echo "ERROR: Tag version ($TAG_VER) does not match src/config.h ($CODE_VER)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini', 'boards/**') }}

      - name: Install PlatformIO
        run: pip install platformio adafruit-nrfutil

      - name: Build firmware
        run: pio run

      - name: Prepare release artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p releases
          cp .pio/build/seeed_xiao_nrf52840/firmware.zip \
             "releases/ghost_operator_dfu-v${VERSION}.zip"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract everything between ## [VERSION] and the next ## [ heading
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Write to file to preserve multiline formatting
          echo "$BODY" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/ghost_operator_dfu-*.zip
          body_path: /tmp/release_body.md

  # Mirror the release to the public v1 repo so the product site picks it up
  publish-to-v1:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo underactive/ghost-operator-v2 \
            --pattern "*.zip" \
            --dir ./artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release notes
        run: |
          gh release view "$GITHUB_REF_NAME" \
            --repo underactive/ghost-operator-v2 \
            --json body --jq .body > /tmp/release_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release on public repo
        run: |
          gh release create "$GITHUB_REF_NAME" ./artifacts/*.zip \
            --repo underactive/ghost-operator \
            --title "Ghost Operator $GITHUB_REF_NAME" \
            --notes-file /tmp/release_body.md
        env:
          GH_TOKEN: ${{ secrets.V1_REPO_PAT }}
