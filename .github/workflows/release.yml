name: Build & Release DFU

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # Version from git tag
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"

          # Version from src/common/config.h
          CODE_VER=$(grep -E '^#define VERSION "' src/common/config.h | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:  $TAG_VER"
          echo "Code version: $CODE_VER"

          if [[ "$TAG_VER" != "$CODE_VER" ]]; then
            echo "ERROR: Tag version ($TAG_VER) does not match src/common/config.h ($CODE_VER)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini', 'boards/**') }}

      - name: Install PlatformIO
        run: pip install "click<8.2" platformio adafruit-nrfutil

      - name: Build nRF52 firmware
        run: pio run -e seeed_xiao_nrf52840

      - name: Build ESP32-C6 LCD firmware
        run: pio run -e c6lcd

      - name: Build ESP32-S3 LCD firmware
        run: pio run -e s3lcd

      - name: Build ESP32-S3 LCD USB-C firmware
        run: pio run -e s3lcdb

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build
          npm run test --if-present

      - name: Package release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p releases

          # nRF52 — DFU zip is auto-generated by PlatformIO + adafruit-nrfutil
          cp .pio/build/seeed_xiao_nrf52840/firmware.zip \
             "releases/ghost_operator_nrf52-v${VERSION}.zip"

          # ESP32 boards — collect binaries into per-board zips
          for board_env in c6lcd s3lcd s3lcdb; do
            case $board_env in
              c6lcd)  NAME="esp32-c6-lcd" ;;
              s3lcd)  NAME="esp32-s3-lcd" ;;
              s3lcdb) NAME="esp32-s3-lcd-usbc" ;;
            esac

            DIR="releases/ghost_operator_${NAME}-v${VERSION}"
            mkdir -p "$DIR"
            cp .pio/build/${board_env}/firmware.bin "$DIR/"
            cp .pio/build/${board_env}/bootloader.bin "$DIR/"
            cp .pio/build/${board_env}/partitions.bin "$DIR/"
            find ~/.platformio -name boot_app0.bin -path "*/espressif32/*" | head -1 | xargs -I{} cp {} "$DIR/"
            (cd releases && zip -r "ghost_operator_${NAME}-v${VERSION}.zip" "ghost_operator_${NAME}-v${VERSION}/")
            rm -rf "$DIR"
          done

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract everything between ## [VERSION] and the next ## [ heading
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Write to file to preserve multiline formatting
          echo "$BODY" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/ghost_operator_*-v*.zip
          body_path: /tmp/release_body.md
